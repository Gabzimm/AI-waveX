services:
  - type: web
    name: minha-api-ia
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false  # Você vai configurar manualmente no dashboard
      - key: MODEL_NAME
        value: gpt-3.5-turbo
      - key: PYTHON_VERSION
        value: 3.10.0
    healthCheckPath: /health
